name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # Payment/billing configuration comes from GitHub Actions secrets. The
    # unit tests run with no database and no network, but wiring the names
    # here keeps the secret inventory documented and validated in one place.
    # Values in repo secrets are PLACEHOLDERS until real (test-mode) keys are
    # rotated in; runtime secrets live in AWS Secrets Manager
    # (dd/remote-dev/agent-secrets) for the cluster and
    # ~/.config/athlet-o/secrets.env locally.
    env:
      ATHLETO_STRIPE_SECRET_KEY: ${{ secrets.ATHLETO_STRIPE_SECRET_KEY }}
      ATHLETO_STRIPE_PUBLISHABLE_KEY: ${{ secrets.ATHLETO_STRIPE_PUBLISHABLE_KEY }}
      ATHLETO_STRIPE_WEBHOOK_SECRET: ${{ secrets.ATHLETO_STRIPE_WEBHOOK_SECRET }}
      ATHLETO_PAYPAL_CLIENT_ID: ${{ secrets.ATHLETO_PAYPAL_CLIENT_ID }}
      ATHLETO_PAYPAL_CLIENT_SECRET: ${{ secrets.ATHLETO_PAYPAL_CLIENT_SECRET }}
      ATHLETO_PAYPAL_WEBHOOK_ID: ${{ secrets.ATHLETO_PAYPAL_WEBHOOK_ID }}
      ATHLETO_PAYPAL_ENV: sandbox
      ATHLETO_SQUARE_ACCESS_TOKEN: ${{ secrets.ATHLETO_SQUARE_ACCESS_TOKEN }}
      ATHLETO_SQUARE_LOCATION_ID: ${{ secrets.ATHLETO_SQUARE_LOCATION_ID }}
      ATHLETO_SQUARE_WEBHOOK_SIGNATURE_KEY: ${{ secrets.ATHLETO_SQUARE_WEBHOOK_SIGNATURE_KEY }}
      ATHLETO_SQUARE_ENV: sandbox
      ATHLETO_BILLING_URL: ${{ secrets.ATHLETO_BILLING_URL }}
      ATHLETO_BILLING_API_KEY: ${{ secrets.ATHLETO_BILLING_API_KEY }}
      ATHLETO_BILLING_TENANT_ID: ${{ secrets.ATHLETO_BILLING_TENANT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked
      - run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true
